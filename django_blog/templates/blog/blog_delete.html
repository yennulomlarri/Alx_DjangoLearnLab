{% extends "blog/base.html" %}

{% block title %}Delete {{ object.title }}{% endblock %}

{% block content %}
<div class="delete-confirmation">
    <h2>Delete Post</h2>
    <p>Are you sure you want to delete the post "{{ object.title }}"?</p>
    <form method="POST">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Yes, Delete</button>
        <a href="{% url 'post_detail' object.pk %}" class="btn">Cancel</a>  <!-- ✅ Fixed: post-detail → post_detail, object.id → object.pk -->
    </form>
</div>
{% endblock %}
