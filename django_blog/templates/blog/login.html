{% extends "blog/base.html" %}
{% load static %}

{% block title %}Login - Django Blog{% endblock %}

{% block content %}
<div class="form-container">
    <h2>Login</h2>
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Login</button>
    </form>
    <p>Don’t have an account? <a href="{% url 'register' %}">Register</a></p>
</div>
{% endblock %}
